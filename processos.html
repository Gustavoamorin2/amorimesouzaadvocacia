<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processos - CRM AMR ADV</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
body { display:flex; background:#f0f2f5; height:100vh; overflow:hidden; }

.sidebar {
  width:80px; background:#1e1e2f; display:flex; flex-direction:column; align-items:center;
  padding:20px 0; transition:width .4s; z-index:10;
}
.sidebar.expanded { width:220px; }
.sidebar h2 { color:#fff; font-size:22px; font-family:'Poppins',sans-serif; margin-bottom:30px; cursor:pointer; opacity:0; transition:opacity .3s; }
.sidebar.expanded h2 { opacity:1; }
.sidebar button {
  background:none; border:none; color:#fff; width:100%; text-align:left; padding:12px 20px;
  display:flex; align-items:center; gap:15px; cursor:pointer; border-radius:10px;
  transition:background .3s; white-space:nowrap; overflow:hidden;
}
.sidebar button img { width:24px; height:24px; filter:invert(1); }
.sidebar button:hover { background:#2a2a40; }

.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
header {
  height:60px; background:#fff; display:flex; justify-content:space-between; align-items:center;
  padding:0 20px; box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
header h1 { font-size:22px; color:#1e1e2f; font-family:'Poppins',sans-serif; }

.kanban-container { flex:1; overflow-y:auto; padding:20px; }
.kanban { display:flex; flex-wrap:wrap; gap:20px; }
.card {
  width:320px; background:#fff; border-radius:15px; box-shadow:0 8px 20px rgba(0,0,0,0.1);
  display:flex; cursor:pointer; overflow:hidden; transition:transform .2s;
}
.card:hover { transform:scale(1.03); }
.color-bar { width:8px; background:#2ecc71; }
.card-content { padding:18px; flex:1; }
.card-content h3 { font-size:18px; margin-bottom:6px; color:#333; }
.card-content p { font-size:14px; color:#555; margin:3px 0; }

.modal-backdrop {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4);
  justify-content:center; align-items:center; z-index:50;
}
.modal {
  background:#fff; padding:20px; border-radius:15px; width:400px;
  max-height:80vh; overflow-y:auto;
}
.modal h3 { margin-bottom:10px; }
.modal .row { margin-bottom:15px; }
.modal input {
  width:100%; padding:8px; border:1px solid #ccc; border-radius:6px; margin-top:4px;
}
.actions { display:flex; justify-content:flex-end; gap:10px; }
.btn { padding:8px 12px; border:none; border-radius:6px; cursor:pointer; }
.btn.primary { background:#1e1e2f; color:#fff; }
.btn.ghost { background:#eee; }

.add-processo { margin-bottom:10px; text-align:right; }
.add-processo button {
  background:#1e1e2f; color:#fff; border:none; padding:6px 10px; border-radius:6px; cursor:pointer;
}
</style>
</head>

<body>
<div class="sidebar">
  <h2 onclick="window.location.href='dashboard.html'">AMR ADV</h2>
  <button onclick="location.href='crm.html'"><img src="https://img.icons8.com/ios-filled/50/ffffff/dashboard.png"/><span>CRM</span></button>
  <button onclick="window.location.href='clientes.html'"><img src="https://img.icons8.com/ios-filled/50/ffffff/user-group-man-man.png"/><span>Clientes</span></button>
  <button onclick="window.location.href='processos.html'"><img src="https://img.icons8.com/ios-filled/50/ffffff/file.png"/><span>Processos</span></button>
</div>

<div class="main">
  <header><h1>Processos Fechados</h1></header>
  <div class="kanban-container">
    <div class="kanban" id="clientesContainer"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h3 id="modalTitle">Processos</h3>

    <div class="add-processo">
      <button id="btnAddProcesso">+ Adicionar Processo</button>
    </div>

    <form id="processosForm">
      <div id="processosContainer"></div>
      <div class="actions">
        <button type="submit" class="btn primary">Salvar</button>
        <button type="button" class="btn ghost" id="btnCancel">Cancelar</button>
      </div>
    </form>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAFJJAqVf3ge0WDHBpmS9E6sXKvnjuFkhw",
  authDomain: "dapapp-38637.firebaseapp.com",
  projectId: "dapapp-38637",
  storageBucket: "dapapp-38637.appspot.com",
  messagingSenderId: "628852295313",
  appId: "1:628852295313:web:1234567890abcdef123456"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const clientesContainer = document.getElementById("clientesContainer");
const modalBackdrop = document.getElementById("modalBackdrop");
const processosForm = document.getElementById("processosForm");
const processosContainer = document.getElementById("processosContainer");
const modalTitle = document.getElementById("modalTitle");
const btnAddProcesso = document.getElementById("btnAddProcesso");
const btnCancel = document.getElementById("btnCancel");

let clienteAtual = null;

// Carregar clientes com status "fechado"
async function carregarClientes() {
  clientesContainer.innerHTML = "";
  const snapshot = await getDocs(collection(db, "clientes"));
  snapshot.forEach(docSnap => {
    const cliente = { id: docSnap.id, ...docSnap.data() };
    if (cliente.status === "fechado") {
      const card = document.createElement("div");
      card.className = "card";
      card.onclick = () => abrirModal(cliente);

      const colorBar = document.createElement("div");
      colorBar.className = "color-bar";
      card.appendChild(colorBar);

      const content = document.createElement("div");
      content.className = "card-content";
      content.innerHTML = `
        <h3>${cliente.nome || "Sem nome"}</h3>
        <p>CPF: ${cliente.cpf || "-"}</p>
        <p>Classe: ${cliente.classe || "-"}</p>
        <p>Valor: ${cliente.valor || "-"}</p>
      `;
      card.appendChild(content);
      clientesContainer.appendChild(card);
    }
  });
}

async function abrirModal(cliente) {
  clienteAtual = cliente;
  modalTitle.textContent = `Processos de ${cliente.nome}`;
  processosContainer.innerHTML = "";

  const processos = cliente.processo
    ? cliente.processo.split(",").map(p => p.trim())
    : [];

  processos.forEach(numero => adicionarLinhaProcesso(numero));

  modalBackdrop.style.display = "flex";
}

// Adiciona uma nova linha de processo no modal
function adicionarLinhaProcesso(numero = "") {
  const row = document.createElement("div");
  row.className = "row";
  row.innerHTML = `
    <input type="text" placeholder="Número do processo" class="numero" value="${numero}">
    <input type="text" placeholder="Classe" class="classe">
    <input type="text" placeholder="Valor da causa" class="valorCausa">
    <input type="text" placeholder="Andamento / última movimentação" class="andamento">
  `;
  processosContainer.appendChild(row);
}

btnAddProcesso.onclick = () => adicionarLinhaProcesso();

processosForm.onsubmit = async (e) => {
  e.preventDefault();
  if (!clienteAtual) return;

  const processos = [];
  const processosInputs = processosContainer.querySelectorAll(".row");
  processosInputs.forEach(row => {
    const numero = row.querySelector(".numero").value.trim();
    const classe = row.querySelector(".classe").value.trim();
    const valorCausa = row.querySelector(".valorCausa").value.trim();
    const andamento = row.querySelector(".andamento").value.trim();
    if (numero) {
      processos.push({ numero, classe, valorCausa, andamento });
    }
  });

  const docRef = doc(db, "clientes", clienteAtual.id);
  await updateDoc(docRef, {
    processosLista: processos,
    processo: processos.map(p => p.numero).join(", ")
  });

  alert("Processos atualizados com sucesso!");
  modalBackdrop.style.display = "none";
  carregarClientes();
};

btnCancel.onclick = () => { modalBackdrop.style.display = "none"; };

// Inicializa
carregarClientes();
</script>
</body>
</html>
